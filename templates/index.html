<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Tumor Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="main-content">
            <h1 class="text-center mb-4">Brain Tumor Detection</h1>
            
            <div class="upload-section">
                <form id="upload-form" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="image-input" class="form-label">Select MRI Image</label>
                        <input type="file" class="form-control" id="image-input" accept="image/*" required>
                    </div>
                    <div class="preview-section mb-3 d-none">
                        <img id="image-preview" class="img-fluid rounded" alt="Preview">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Analyze Image</button>
                </form>
            </div>

            <div id="result-section" class="mt-4 d-none">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Analysis Result</h5>
                        <p id="result-text" class="card-text h4 text-center mb-4"></p>
                        <div class="chart-container" style="position: relative; height:300px; width:100%;">
                            <canvas id="resultChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div id="loading-section" class="text-center mt-4 d-none">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2">Analyzing image...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
